name: Citizen-Pulse
on: [push, workflow_dispatch]
jobs:
  mission:
    runs-on: ubuntu-latest
    steps:
      - name: Prep
        run: sudo apt-get update && sudo apt-get install -y wireguard-tools jq curl xvfb
      - name: Run
        run: |
          npm install playwright-extra playwright-stealth
          xvfb-run node <<-NODE_EOF
          const { chromium } = require("playwright-extra");
          const stealth = require("playwright-stealth")();
          const { execSync } = require("child_process");
          chromium.use(stealth);
          const sites = ["https://radiant-jelly.netlify.app", "https://cloud-dream.netlify.app", "https://dream-cloudy.netlify.app"];
          async function cycleWarp() {
            try {
              execSync("sudo wg-quick down wg0");
            } catch(e) {}
            execSync("curl -L https://github.com/ViRb3/wgcf/releases/download/v2.2.30/wgcf_2.2.30_linux_amd64 -o wgcf && chmod +x wgcf && ./wgcf register --accept-tos && ./wgcf generate && sudo cp wgcf-profile.conf /etc/wireguard/wg0.conf && sudo wg-quick up wg0");
            await new Promise(r => setTimeout(r, 12000));
          }
          (async () => {
            const browser = await chromium.launch({ headless: true });
            for (let i = 1; i <= 300; i++) {
              await cycleWarp();
              const context = await browser.newContext({ userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0" });
              const page = await context.newPage();
              await page.goto("https://google.com");
              await new Promise(r => setTimeout(r, 10000));
              const target = sites[Math.floor(Math.random() * sites.length)];
              await page.goto(target, { waitUntil: "networkidle" });
              await page.evaluate(() => window.scrollBy({ top: 800, behavior: "smooth" }));
              await new Promise(r => setTimeout(r, 45000));
              await page.goto(target + "/post1.html");
              await new Promise(r => setTimeout(r, 45000));
              if (Math.random() < 0.025) {
                await page.mouse.click(400, 400);
              }
              await context.close();
            }
            await browser.close();
          })();
          NODE_EOF
