name: Heist-Final
on: [push, workflow_dispatch]
jobs:
  mission:
    runs-on: ubuntu-latest
    steps:
      - name: Prep
        run: sudo apt-get update && sudo apt-get install -y wireguard-tools jq curl xvfb
      - name: Run
        run: |
          npm install playwright-extra playwright-stealth
          xvfb-run node <<-\NODE_EOF
            const { chromium } = require("playwright-extra");
            const stealth = require("playwright-stealth")();
            const { execSync } = require("child_process");
            chromium.use(stealth);
            async function cycleWarp() {
              try { execSync("sudo wg-quick down wg0"); } catch(e){}
              execSync("curl -L https://github.com/ViRb3/wgcf/releases/download/v2.2.30/wgcf_2.2.30_linux_amd64 -o wgcf && chmod +x wgcf && ./wgcf register --accept-tos && ./wgcf generate && sudo cp wgcf-profile.conf /etc/wireguard/wg0.conf && sudo wg-quick up wg0");
              await new Promise(r => setTimeout(r, 12000));
            }
            (async () => {
              const browser = await chromium.launch({ headless: true });
              for (let i = 1; i <= 400; i++) {
                await cycleWarp();
                const context = await browser.newContext({ userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" });
                const page = await context.newPage();
                await page.addInitScript(() => { Object.defineProperty(navigator, "getBattery", { value: () => Promise.resolve({ level: 0.75, charging: false }) }); });
                await page.goto("https://www.google.com");
                await page.goto("https://radiant-jelly.netlify.app", { waitUntil: "networkidle" });
                await page.evaluate(() => window.scrollBy({ top: 500, behavior: "smooth" }));
                await new Promise(r => setTimeout(r, 120000));
                if (Math.random() < 0.025) await page.mouse.click(350, 350);
                await context.close();
              }
              await browser.close();
            })();
NODE_EOF

